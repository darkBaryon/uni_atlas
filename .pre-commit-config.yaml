repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
      - id: mypy
        name: mypy type check
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest (helpers + parser goldens)
        entry: python3 -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
