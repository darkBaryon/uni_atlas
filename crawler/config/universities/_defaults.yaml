# 所有学校 YAML 的默认层（下划线开头 = 非学校文件，不进 all_unis）。
# 各校 YAML 只需写差异项；同名字段以学校文件为准（浅层按键覆盖）。
country: UK
entry_year: "2026"

scope:
  # 辅导镜头（2026-07-04 定，见 docs/数据策略.md）：
  # 课程【名单+链接】是核心数据（经专业页/目录页采集入库）；
  # 课程【详情页】不镜像——官方目录已完善，存链接跳官网，
  # 机构自有经验沉淀在 module_contents 人工层。
  # 本开关只控制“是否批量抓取课程详情页”，与名单采集无关。
  crawl_module_details: false
