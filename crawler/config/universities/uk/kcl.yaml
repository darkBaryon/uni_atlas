# King's College London —— 入口页来自 docs/英国院校公开信息调研.md 第 7 节（2026-07 调研）
# 注意：KCL term dates 不在主站公开页；旧校历/学院短链接已失效，勿用。
code: kcl
name: King's College London
name_zh: 伦敦国王学院
website: https://www.kcl.ac.uk
country: UK
city: London

entry_year: "2026"

domains:
  # 2026-07-05 实测：interval 1.0 + concurrency 3 触发 429（退避+挂起反而更慢），
  # 「大站无限流」假设不成立，回保守档。
  www.kcl.ac.uk: {interval: 3.0, concurrency: 1}
  # 学生支持站，仅取 term dates 单页，保持保守。
  self-service.kcl.ac.uk: {interval: 3.0, concurrency: 1}

scope:
  crawl_module_details: false

faculties:
  "Faculty of Arts & Humanities": 人文艺术学院
  "King's Business School": 国王商学院
  "Faculty of Dentistry, Oral & Craniofacial Sciences": 牙科、口腔与颅面科学学院
  "The Dickson Poon School of Law": 迪克森潘法学院
  "Faculty of Life Sciences & Medicine": 生命科学与医学学院
  "Faculty of Natural, Mathematical & Engineering Sciences": 自然、数学与工程科学学院
  "Florence Nightingale Faculty of Nursing, Midwifery & Palliative Care": 弗洛伦斯·南丁格尔护理、助产与姑息护理学院
  "Institute of Psychiatry, Psychology & Neuroscience": 精神病学、心理学与神经科学学院
  "Faculty of Social Science & Public Policy": 社会科学与公共政策学院

# 交换生模块目录 Department 字段措辞 → 官方学部名
faculty_alias:
  "Arts & Humanities": Faculty of Arts & Humanities
  "Dentistry, Oral & Craniofacial Sciences": Faculty of Dentistry, Oral & Craniofacial Sciences
  "Life Sciences & Medicine": Faculty of Life Sciences & Medicine
  "Natural, Mathematical & Engineering Sciences": Faculty of Natural, Mathematical & Engineering Sciences
  "Nursing, Midwifery & Palliative Care": Florence Nightingale Faculty of Nursing, Midwifery & Palliative Care
  "Psychiatry, Psychology & Neuroscience": Institute of Psychiatry, Psychology & Neuroscience
  "Social Science & Public Policy": Faculty of Social Science & Public Policy
  "Law": The Dickson Poon School of Law
  "Business": King's Business School

