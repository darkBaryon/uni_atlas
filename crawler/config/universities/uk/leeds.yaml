# University of Leeds -- public-entry crawler config for 2026 entry.
code: leeds
name: University of Leeds
name_zh: 利兹大学
website: https://www.leeds.ac.uk
country: UK
city: Leeds

entry_year: "2026"

domains:
  www.leeds.ac.uk: {interval: 1.0, concurrency: 3}
  courses.leeds.ac.uk: {interval: 1.0, concurrency: 3}
  # 课程目录实测全开放无限流（2026-07 审核），推到高档。interval 保留 0.5s 作兜底。
  catalogue.leeds.ac.uk: {interval: 0.5, concurrency: 8}

scope:
  crawl_module_details: false

faculties:
  "Faculty of Arts, Humanities and Cultures": 艺术、人文与文化学院
  "Faculty of Biological Sciences": 生物科学学院
  "Faculty of Business": 商学院
  "Faculty of Engineering and Physical Sciences": 工程与物理科学学院
  "Faculty of Environment": 环境学院
  "Faculty of Medicine and Health": 医学与健康学院
  "Faculty of Social Sciences": 社会科学学院
  "Leeds University Business School": 利兹大学商学院

# 课程目录区块标题（教学单元名）→ 官方院系（人工整理 2026-07；拿不准的不映射）
faculty_alias:
  "Health Economics": Faculty of Medicine and Health
  "Audiology, Radiography and Cardiology Sciences": Faculty of Medicine and Health
  "Family Therapy": Faculty of Medicine and Health
  "Anatomy": Faculty of Medicine and Health
  "Cardiovascular Medicine": Faculty of Medicine and Health
  "Epidemiology and Biostatistics": Faculty of Medicine and Health
  "Biomedical Sciences": Faculty of Biological Sciences
  "Biology": Faculty of Biological Sciences
  "Microbiology": Faculty of Biological Sciences
  "Biochemistry and Molecular Biology": Faculty of Biological Sciences
  "Sport and Exercise Sciences": Faculty of Biological Sciences
  "Chemical and Process Engineering": School of Chemical and Process Engineering
  "History and Philosophy of Science": School of Philosophy, Religion and History of Science
  "Professional French": School of Languages, Cultures and Societies
  "Languages for All": School of Languages, Cultures and Societies
  "English Language Unit": The Language Centre
  "Online Digital Learning Computing": School of Computer Science

seed_pages:
  # 官方课程目录（全开放）：UG/TP 两张表单页 → 按学院结果页
  - {category: module_catalog, crawl_freq: monthly,
     url: "https://catalogue.leeds.ac.uk/ModuleSearch/UG"}
  - {category: module_catalog, crawl_freq: monthly,
     url: "https://catalogue.leeds.ac.uk/ModuleSearch/TP"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://courses.leeds.ac.uk/course-search/undergraduate-courses?query=&type=UG&term=202627"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://courses.leeds.ac.uk/course-search/masters-courses?query=&type=PGT&term=202627"}
  - {category: term_dates, crawl_freq: monthly,
     url: "https://www.leeds.ac.uk/term-dates"}
  - {category: ug_admissions, crawl_freq: weekly,
     url: "https://www.leeds.ac.uk/undergraduate-how-to-apply/doc/application-timetable"}
  - {category: pg_admissions, crawl_freq: weekly,
     url: "https://www.leeds.ac.uk/masters"}
  - {category: china_page, crawl_freq: monthly,
     url: "https://www.leeds.ac.uk/admissions-qualifications/21834/china"}
  - {category: faculty_list, crawl_freq: monthly,
     url: "https://www.leeds.ac.uk/about/doc/faculties-contacts"}
