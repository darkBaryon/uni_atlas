# University of Warwick —— 入口页来自 docs/英国院校公开信息调研.md 第 8 节（2026-07 调研）
# 课程列表页可能由 JS 动态加载；解析器会尽量解析静态链接/嵌入数据，抓不到时只记录 note。
code: warwick
name: University of Warwick
name_zh: 华威大学
website: https://warwick.ac.uk
country: UK
city: Coventry

entry_year: "2026"

domains:
  # 2026-07 复核：此前“429 限流”系误判——20 路并发实测全 200/404、零 429、无 challenge。
  # 唯一特征是响应慢（首访 ~8s，之后 2-3s/页），故靠并发提吞吐、间隔收紧。
  # 主站实测会 429（2026-07-05 termdates 中招）——高并发只适用 courses 子域
  warwick.ac.uk: {interval: 3.0, concurrency: 1}
  # 官方模块目录（courses.warwick.ac.uk/modules）：并发容忍度实测最高（20 路并发全 200）；
  # 单页慢（2-3s），多开并发收益最大，推到高档。interval 保留 0.5s 作兜底。
  courses.warwick.ac.uk: {interval: 0.5, concurrency: 8}

scope:
  crawl_module_details: false

faculties:
  "Faculty of Arts": 文学院
  "Faculty of Science, Engineering and Medicine": 科学、工程与医学院
  "Faculty of Social Sciences": 社会科学学院

seed_pages:
  # 官方课程目录（全开放）：表单页枚举系 → 搜索页收名单
  - {category: module_catalog, crawl_freq: monthly,
     url: "https://courses.warwick.ac.uk/modules"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://warwick.ac.uk/study/undergraduate/courses-2026/"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://warwick.ac.uk/study/postgraduate/courses/"}
  - {category: term_dates, crawl_freq: monthly,
     url: "https://warwick.ac.uk/study/termdates"}
  # 考试期（辅导旺季排班核心）：教务处考试日期页
  - {category: term_dates, crawl_freq: monthly,
     url: "https://warwick.ac.uk/services/academicoffice/modules_marks_assessments/students/examination_dates/"}
  - {category: ug_admissions, crawl_freq: weekly,
     url: "https://warwick.ac.uk/study/undergraduate"}
  - {category: pg_admissions, crawl_freq: weekly,
     url: "https://warwick.ac.uk/study/postgraduate"}
  - {category: language_req, crawl_freq: monthly,
     url: "https://warwick.ac.uk/study/international/admissions/englishlanguage/"}
  - {category: china_page, crawl_freq: monthly,
     url: "https://warwick.ac.uk/study/international/countryinformation/"}
  - {category: faculty_list, crawl_freq: monthly,
     url: "https://warwick.ac.uk/fac"}
