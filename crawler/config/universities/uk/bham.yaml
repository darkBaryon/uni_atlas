code: bham
name: University of Birmingham
name_zh: 伯明翰大学
country: UK
city: Birmingham
website: https://www.birmingham.ac.uk
entry_year: "2026"

domains:
  www.birmingham.ac.uk: {interval: 1.0, concurrency: 3}
  # 官方 Programmes & Modules Handbook：JSESSIONID servlet，无反爬纯 200，但会话态 +
  # 后端偏慢，并发别开太猛以免 session 争用，取中低档。
  program-and-modules-handbook.bham.ac.uk:
    interval: 1.5
    concurrency: 2
    # 会话态 servlet：模块名单页只对「访问过 schoolList+任一 programList」的
    # 会话渲染（实测 2026-07-05），每次运行先按序预热
    prime:
      - "https://program-and-modules-handbook.bham.ac.uk/webhandbooks/WebHandbooks-control-servlet?Action=getSchoolList"
      - "https://program-and-modules-handbook.bham.ac.uk/webhandbooks/WebHandbooks-control-servlet?Action=getProgramList&pgDeptId=027&pgDdesc=Law"


scope:
  crawl_module_details: false

faculties:
  College of Arts and Law: 艺术与法律学院
  College of Engineering and Physical Sciences: 工程与物理科学学院
  College of Life and Environmental Sciences: 生命与环境科学学院
  College of Medicine and Health: 医学与健康学院
  College of Social Sciences: 社会科学学院

seed_pages:
  # 官方 Programmes & Modules Handbook：模块名单权威源（52 院系）
  - {category: module_catalog, crawl_freq: monthly,
     url: "https://program-and-modules-handbook.bham.ac.uk/webhandbooks/WebHandbooks-control-servlet?Action=getSchoolList"}
  - category: program_catalog
    url: https://www.birmingham.ac.uk/study/undergraduate/course-search
    crawl_freq: monthly
    note: Undergraduate course search.
  - category: program_catalog
    url: https://www.birmingham.ac.uk/study/postgraduate/course-search
    crawl_freq: monthly
    note: Postgraduate course search.
  - category: term_dates
    url: https://www.birmingham.ac.uk/undergraduate/courses/academicyear
    crawl_freq: monthly
    note: Official academic year dates from the undergraduate academic year page.
  - category: ug_admissions
    url: https://www.birmingham.ac.uk/study/undergraduate
    crawl_freq: weekly
  - category: pg_admissions
    url: https://www.birmingham.ac.uk/study/postgraduate
    crawl_freq: weekly
  - category: china_page
    url: https://www.birmingham.ac.uk/study/international/country/china
    crawl_freq: monthly
  - category: faculty_list
    url: https://www.birmingham.ac.uk/about/colleges-schools-and-departments
    crawl_freq: monthly
