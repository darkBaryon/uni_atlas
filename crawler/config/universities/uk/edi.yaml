# University of Edinburgh —— entries from docs/英国院校公开信息调研.md 第 3 节
code: edi
name: University of Edinburgh
name_zh: 爱丁堡大学
website: https://www.ed.ac.uk
country: UK
city: Edinburgh

entry_year: "2026"

# 2026-07 并发实测：均无 429/challenge。drps（课程目录）持续加压干净；
# study（专业页）持续加压下响应长尾涨到 ~11s（服务器变慢，非拦截），故 study 取保守档。
domains:
  study.ed.ac.uk: {interval: 1.0, concurrency: 2}
  semester-dates.ed.ac.uk: {interval: 3.0, concurrency: 1}   # 仅少量校历页，无需并发
  www.ed.ac.uk: {interval: 1.0, concurrency: 2}
  www.drps.ed.ac.uk: {interval: 1.0, concurrency: 3}

expect:
  exam_skip: true   # 26/27 考试期官网标 To be confirmed（月度任务候发布；25/26 已考完）

scope:
  crawl_module_details: false

faculties:
  "College of Arts, Humanities and Social Sciences": 艺术、人文与社会科学学院
  "College of Medicine and Veterinary Medicine": 医学与兽医学院
  "College of Science and Engineering": 科学与工程学院
  # 医学院下属（DRPS 目录出现、专业页不出现，行由 loader 建）
  "School of Genetics and Cancer": 遗传学与癌症学院
  "School of Neurological and Cardiovascular Sciences": 神经与心血管科学学院
  "School of Regeneration and Repair": 再生与修复学院
  "School of Population Health Sciences": 人口健康科学学院
  "Centre for Open Learning": 开放学习中心

# DRPS 课程目录的叫法 → 库中官方名
faculty_alias:
  "School of Law": Edinburgh Law School
  "School of Geosciences": School of GeoSciences

seed_pages:
  # 官方课程目录 DRPS：学院索引 → 科目 → 课程名单（只收名单+链接）
  - {category: module_catalog, crawl_freq: monthly,
     url: "https://www.drps.ed.ac.uk/26-27/dpt/cx_schindex.htm"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://study.ed.ac.uk/programmes/undergraduate-a-z-2026"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://study.ed.ac.uk/programmes/postgraduate-taught-a-z"}
  - {category: term_dates, crawl_freq: monthly,
     url: "https://semester-dates.ed.ac.uk/202526"}
  - {category: ug_admissions, crawl_freq: weekly,
     url: "https://study.ed.ac.uk/undergraduate/applying/after-you-apply/key-dates-for-2026-applicants"}
  - {category: pg_admissions, crawl_freq: weekly,
     url: "https://study.ed.ac.uk/postgraduate/applying/when"}
  - {category: china_page, crawl_freq: monthly,
     url: "https://www.ed.ac.uk/studying/international/postgraduate-entry/asia/china"}
  - {category: faculty_list, crawl_freq: monthly,
     url: "https://www.ed.ac.uk/schools-departments/colleges-schools"}
