# University of Manchester —— entries from docs/英国院校公开信息调研.md 第 2 节
code: man
name: University of Manchester
name_zh: 曼彻斯特大学
website: https://www.manchester.ac.uk
country: UK
city: Manchester

entry_year: "2026"

domains:
  www.manchester.ac.uk: {interval: 1.0, concurrency: 3}
  # uPortal portlet 是会话态（每域一次 cookie 预热 + POST 检索），并发会打乱握手，
  # 保持单并发串行。
  portal.manchester.ac.uk: {interval: 2.0, concurrency: 1}

expect:
  module_faculty_pct: 0     # 曼大归属经专业引用（portlet 无院系字段）

scope:
  crawl_module_details: false

faculties:
  "Faculty of Biology, Medicine and Health": 生物、医学与健康学院
  "Faculty of Science and Engineering": 科学与工程学院
  "Faculty of Humanities": 人文学院

seed_pages:
  # 官方课程目录：uPortal portlet 表单页（学科下拉→portlet_post 检索任务）
  - {category: module_catalog, crawl_freq: monthly,
     url: "https://portal.manchester.ac.uk/uPortal/p/course-unit-info.ctf1/max/render.uP"}
  # Docs mention the crawler-friendly A-Z lists; current official simple lists return 200.
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://www.manchester.ac.uk/study/undergraduate/courses/2026/basic/"}
  - {category: program_catalog, crawl_freq: monthly,
     url: "https://www.manchester.ac.uk/study/masters/courses/list/basic/"}
  - {category: term_dates, crawl_freq: monthly,
     url: "https://www.manchester.ac.uk/about/key-dates/"}
  - {category: ug_admissions, crawl_freq: weekly,
     url: "https://www.manchester.ac.uk/study/undergraduate/applying/"}
  - {category: pg_admissions, crawl_freq: weekly,
     url: "https://www.manchester.ac.uk/study/masters/"}
  - {category: china_page, crawl_freq: monthly,
     url: "https://www.manchester.ac.uk/study/international/country-specific-information/china-mainland/entry-requirements/"}
  - {category: faculty_list, crawl_freq: monthly,
     url: "https://www.manchester.ac.uk/about/structure/faculties-schools/"}
